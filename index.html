<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="theme-color" content="#060608"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Evora — Fiera 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore,doc,getDoc,setDoc,updateDoc,deleteDoc,collection,getDocs,query,orderBy,where,runTransaction,onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({
      apiKey:"AIzaSyBeHgXy0V1YqIWP8HruIZ4rztIaNfXsUxk",
      authDomain:"evora-fiera.firebaseapp.com",
      projectId:"evora-fiera",
      storageBucket:"evora-fiera.firebasestorage.app",
      messagingSenderId:"513482025378",
      appId:"1:513482025378:web:f8ec60b4d533a6ef6faafb"
    }));

    const DEFAULT_PRIZES=[
      {id:"p1",name:"Zaino Evora",  emoji:"🎒",color:"#B22222",desc:"Zaino sportivo premium Evora",      qty:3,  assigned:0,order:1,value:59},
      {id:"p2",name:"T-Shirt Evora",emoji:"👕",color:"#B22222",desc:"T-shirt tecnica collezione 2026",   qty:10, assigned:0,order:2,value:29},
      {id:"p3",name:"Sconto 30%",   emoji:"💸",color:"#B22222",desc:"Codice sconto 30% su evora.it",     qty:50, assigned:0,order:3,value:0},
      {id:"p4",name:"Shaker Set",   emoji:"🥤",color:"#B22222",desc:"Set shaker + campione integratore", qty:20, assigned:0,order:4,value:15},
      {id:"p5",name:"Sconto 10%",   emoji:"🎁",color:"#B22222",desc:"Codice sconto 10% su evora.it",     qty:999,assigned:0,order:5,value:0},
    ];

    async function initPrizes(){
      for(const p of DEFAULT_PRIZES){
        const r=doc(db,"prizes",p.id);
        if(!(await getDoc(r)).exists()) await setDoc(r,p);
      }
    }

    async function assignPrize(token,name,email,testMode=false,forceDayIndex=-1){
      const emailKey=email?'email_'+email.toLowerCase().replace(/[^a-z0-9]/g,'_'):null;
      const primaryKey=emailKey||token;
      if(!testMode){
        for(const k of [emailKey,token].filter(Boolean)){
          try{const ex=await getDoc(doc(db,"assignments",k));if(ex.exists()&&!ex.data()._ref)return ex.data();}catch(e){}
        }
      }
      let dayIndex=forceDayIndex;
      if(dayIndex<0){
        const today=new Date();
        const ts=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        const fdSnap=await getDoc(doc(db,"config","fairDates"));
        const fairDates=fdSnap.exists()?fdSnap.data().value:[];
        dayIndex=fairDates.indexOf(ts);
      }
      if(dayIndex>=0){
        const seqSnap=await getDoc(doc(db,"sequences","day"+dayIndex));
        if(seqSnap.exists()){
          const daySeq=seqSnap.data().prizes||[];
          if(daySeq.length>0){
            const today=new Date();
            const ts=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            const allAsgn=await getDocs(collection(db,"assignments"));
            const countToday=allAsgn.docs.filter(d=>{
              const a=d.data();
              if(a._ref)return false;
              if(testMode)return a.dayIndex===dayIndex&&a.isTest===true;
              return a.assignedAt&&a.assignedAt.startsWith(ts)&&a.dayIndex===dayIndex&&!a.isTest;
            }).length;
            if(countToday<daySeq.length){
              const prize=daySeq[countToday];
              const code=`EVR-G${dayIndex+1}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
              const asgn={id:primaryKey,userToken:token,userName:name,userEmail:email||token,deviceToken:token,prizeId:`day${dayIndex}_pos${countToday}`,prizeName:prize.name,prizeEmoji:prize.emoji||'🎁',prizeDesc:prize.name,prizeColor:'#B22222',code,status:"assigned",assignedAt:new Date().toISOString(),deliveredAt:null,dayIndex,seqPosition:countToday,isTest:testMode||false};
              await setDoc(doc(db,"assignments",primaryKey),asgn);
              if(token&&token!==primaryKey)await setDoc(doc(db,"assignments",token),{_ref:primaryKey,userEmail:email,deviceToken:token,assignedAt:asgn.assignedAt});
              return asgn;
            }else{return null;}
          }
        }
      }
      const snap=await getDocs(query(collection(db,"prizes"),orderBy("order")));
      const avail=snap.docs.map(d=>({id:d.id,...d.data()})).find(p=>p.assigned<p.qty);
      if(!avail)return null;
      const code=`EVR-${avail.id.toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
      const asgn={id:primaryKey,userToken:token,userName:name,userEmail:email||token,deviceToken:token,prizeId:avail.id,prizeName:avail.name,prizeEmoji:avail.emoji,prizeDesc:avail.desc||avail.name,prizeColor:avail.color,code,status:"assigned",assignedAt:new Date().toISOString(),deliveredAt:null,isTest:testMode||false};
      await runTransaction(db,async tx=>{
        const pr=doc(db,"prizes",avail.id);const f=await tx.get(pr);
        if(f.data().assigned>=f.data().qty)throw new Error("exhausted");
        tx.update(pr,{assigned:f.data().assigned+1});tx.set(doc(db,"assignments",primaryKey),asgn);
      });
      if(token&&token!==primaryKey)await setDoc(doc(db,"assignments",token),{_ref:primaryKey,userEmail:email,deviceToken:token,assignedAt:asgn.assignedAt});
      return asgn;
    }

    // Check already played — 3 levels: email, deviceToken, fingerprint
    // If a pointer doc (_ref) is found, follow it to get the real assignment
    async function checkAlreadyPlayed(token, email, fingerprint){
      const keys=[];
      if(email) keys.push('email_'+email.toLowerCase().replace(/[^a-z0-9]/g,'_'));
      if(token) keys.push(token);
      if(fingerprint) keys.push('fp_'+fingerprint);
      for(const k of keys){
        try{
          const ex=await getDoc(doc(db,"assignments",k));
          if(ex.exists()){
            const d=ex.data();
            if(d._ref){
              // Pointer doc — follow the ref to get the real assignment
              const real=await getDoc(doc(db,"assignments",d._ref));
              if(real.exists()) return real.data();
            }
            return d;
          }
        }catch(e){}
      }
      return null;
    }

    async function markDelivered(token){
      const ref=doc(db,"assignments",token);
      const s=await getDoc(ref);
      if(!s.exists()||s.data().status==="delivered") return false;
      await updateDoc(ref,{status:"delivered",deliveredAt:new Date().toISOString()});
      return true;
    }

    async function getAllAssignments(){
      const s=await getDocs(query(collection(db,"assignments"),orderBy("assignedAt","desc")));
      return s.docs.map(d=>d.data());
    }

    async function findByCode(code){
      const s=await getDocs(query(collection(db,"assignments"),where("code","==",code)));
      return s.empty?null:s.docs[0].data();
    }

    async function getPrizes(){
      const s=await getDocs(query(collection(db,"prizes"),orderBy("order")));
      return s.docs.map(d=>d.data());
    }

    async function savePrizes(list){
      const old=await getDocs(collection(db,"prizes"));
      for(const d of old.docs) await updateDoc(doc(db,"prizes",d.id),{qty:0,assigned:0});
      for(const p of list) await setDoc(doc(db,"prizes",p.id),p);
    }

    function listenAssignment(token,cb){
      return onSnapshot(doc(db,"assignments",token),s=>{if(s.exists())cb(s.data());});
    }

    async function getConfig(key){
      const s=await getDoc(doc(db,"config",key));
      return s.exists()?s.data().value:null;
    }

    async function saveConfig(key,val){
      await setDoc(doc(db,"config",key),{value:val});
    }

    // Save a single day's sequence as its own document: sequences/day0, day1, etc.
    async function saveDaySequence(dayIndex, prizes){
      await setDoc(doc(db,"sequences","day"+dayIndex),{prizes, savedAt:new Date().toISOString()});
    }

    // ── RESET: full tabula rasa ───────────────────────────────────────────
    async function resetAll(){
      // 1. Delete all assignments
      const asnSnap=await getDocs(collection(db,"assignments"));
      await Promise.all(asnSnap.docs.map(d=>deleteDoc(doc(db,"assignments",d.id))));
      // 2. Reset assigned counters on prizes (keep prize config, just zero the counter)
      const prSnap=await getDocs(collection(db,"prizes"));
      await Promise.all(prSnap.docs.map(d=>updateDoc(doc(db,"prizes",d.id),{assigned:0})));
      // 3. Delete regulation config
      try{await deleteDoc(doc(db,"config","regulation"));}catch(e){}
      // 4. Delete uploaded regulation HTML
      try{await deleteDoc(doc(db,"config","regulation_html"));}catch(e){}
      // 5. Delete fair dates
      try{await deleteDoc(doc(db,"config","fairDates"));}catch(e){}
      // 6. Delete day sequences
      for(let i=0;i<4;i++){
        try{await deleteDoc(doc(db,"sequences","day"+i));}catch(e){}
      }
      // 7. Reset test mode
      try{await deleteDoc(doc(db,"config","testMode"));}catch(e){}
    }

    // Helper: get a doc by collection/id, returns data or null
    async function getDoc_(coll,id){
      try{const s=await getDoc(doc(db,coll,id));return s.exists()?s.data():null;}catch(e){return null;}
    }

    // Write a pointer/index document
    async function saveAssignmentPointer(key,data){
      await setDoc(doc(db,"assignments",key),data);
    }

    // Read a single day sequence from sequences/dayN
    async function getConfig_seq(dayIndex){
      try{
        const s=await getDoc(doc(db,"sequences","day"+dayIndex));
        return s.exists()?(s.data().prizes||[]):[];
      }catch(e){return[];}
    }

    window.DB={initPrizes,assignPrize,checkAlreadyPlayed,markDelivered,getAllAssignments,findByCode,getPrizes,savePrizes,listenAssignment,getConfig,saveConfig,resetAll,saveDaySequence,getDoc_,saveAssignmentPointer,getConfig_seq};
    await initPrizes();
    window.dispatchEvent(new Event("db-ready"));
  </script>

    .lw{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;animation:fu .4s ease both}
